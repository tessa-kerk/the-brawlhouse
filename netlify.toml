# The BrawlHouse — Netlify config.
# The site itself is still a plain static folder (no build step). This file
# only exists to declare the Functions directory + pin a Node runtime with
# native fetch (used by netlify/functions/brawler-chat.js — no dependencies,
# no package.json, nothing to npm install).
#
# STAGED, NOT CONNECTED: this file is inert until Netlify↔GitHub continuous
# deployment is actually turned on (Tessa's step — touches her account). Until
# then the site keeps deploying exactly as it does now (drag-and-drop), and
# this file just sits in the repo unused.
[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "20"
